---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalinstances
  - baremetalpools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalinstances/finalizers
  - baremetalpools/finalizers
  verbs:
  - update
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalinstances/status
  - baremetalpools/status
  verbs:
  - get
  - patch
  - update
