fullnameOverride: "bmf-operator"

image:
  repository: ghcr.io/osac-project/bare-metal-fulfillment-operator
  tag: latest
  pullPolicy: Always

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

serviceAccount:
  create: true
  name: ""

secrets:
  inventoryConfig: "osac-inventory-config"
  managementConfig: "osac-management-config"
  osClouds: "osac-os-clouds"

configMaps:
  profiles: "osac-profiles"

env:
  # AAP configuration - these are required and environment-specific
  aapUrl: "https://example.com"  # required
  aapTokenSecretName: "osac-aap-api-token"  # required
  aapTokenSecretKey: "token"  # required
  # Only include values that are commonly changed at deploy time
  # All other values have reasonable defaults in the Go code
